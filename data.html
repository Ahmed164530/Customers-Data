<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عرض بيانات العملاء</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 95%;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 300px;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            margin: 2px;
            border-radius: 5px;
        }

        .edit {
            background: #ffc107;
        }

        .delete {
            background: #dc3545;
            color: white;
        }

        .excel {
            background: #28a745;
            color: white;
        }

        .home {
            background: #007bff;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #eee;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📋 بيانات العملاء</h2>

    <input type="text" id="search" placeholder="ابحث برقم التليفون" onkeyup="searchData()">

    <br>

    <button class="excel" onclick="downloadExcel()">تحميل Excel</button>
    <button class="home" onclick="goHome()">إضافة عميل</button>

    <table>
        <thead>
        <tr>
            <th>اسم</th>
            <th>تليفون</th>
            <th>عنوان</th>
            <th>وظيفة</th>
            <th>شركة</th>
            <th>تاريخ</th>
            <th>ابلكيشن</th>
            <th>مبلغ</th>
            <th>تحكم</th>
        </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>

let editIndex = null;

// تحميل البيانات
function loadData(data = null) {
    let customers = data || JSON.parse(localStorage.getItem("customers")) || [];

    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    customers.forEach((c, index) => {
        table.innerHTML += `
            <tr>
                <td>${c.name || ""}</td>
                <td>${c.phone || ""}</td>
                <td>${c.address || ""}</td>
                <td>${c.job || ""}</td>
                <td>${c.company || ""}</td>
                <td>${c.date || ""}</td>
                <td>${c.app || ""}</td>
                <td>${c.amount || ""}</td>
                <td>
                    <button class="edit" onclick="editCustomer(${index})">تعديل</button>
                    <button class="delete" onclick="deleteCustomer(${index})">حذف</button>
                </td>
            </tr>
        `;
    });
}

// حذف
function deleteCustomer(index) {
    let customers = JSON.parse(localStorage.getItem("customers")) || [];
    customers.splice(index, 1);
    localStorage.setItem("customers", JSON.stringify(customers));
    loadData();
}

// فتح تعديل
function editCustomer(index) {
    let customers = JSON.parse(localStorage.getItem("customers")) || [];
    let c = customers[index];

    let newName = prompt("اسم العميل", c.name);
    let newPhone = prompt("التليفون", c.phone);
    let newAddress = prompt("العنوان", c.address);
    let newJob = prompt("الوظيفة", c.job);
    let newCompany = prompt("الشركة", c.company);
    let newDate = prompt("التاريخ", c.date);
    let newApp = prompt("الابلكيشن", c.app);
    let newAmount = prompt("المبلغ", c.amount);

    customers[index] = {
        name: newName,
        phone: newPhone,
        address: newAddress,
        job: newJob,
        company: newCompany,
        date: newDate,
        app: newApp,
        amount: newAmount
    };

    localStorage.setItem("customers", JSON.stringify(customers));
    loadData();
}

// بحث
function searchData() {
    let value = document.getElementById("search").value;
    let customers = JSON.parse(localStorage.getItem("customers")) || [];

    let filtered = customers.filter(c =>
        (c.phone || "").includes(value)
    );

    loadData(filtered);
}

// Excel

function downloadExcel() {
    let customers = JSON.parse(localStorage.getItem("customers")) || [];

    let csv = "\uFEFF"; // 👈 أهم سطر لحل مشكلة العربي

    csv += "اسم العميل,التليفون,العنوان,الوظيفة,الشركة,التاريخ,الابلكيشن,المبلغ\n";

    customers.forEach(c => {
        csv += `${c.name || ""},${c.phone || ""},${c.address || ""},${c.job || ""},${c.company || ""},${c.date || ""},${c.app || ""},${c.amount || ""}\n`;
    });

    let blob = new Blob([csv], {
        type: "text/csv;charset=utf-8;"
    });

    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "customers.csv";
    a.click();
}

// رجوع
function goHome() {
    window.location.href = "index.html";
}

// أول تحميل
window.onload = loadData;

</script>

</body>
</html>
