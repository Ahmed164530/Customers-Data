<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة عميل</title>

    <style>
        body {
            font-family: "Cairo", Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: right;
        }

        button {
            padding: 12px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #218838;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .msg {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>إضافة عميل</h2>

    <input type="text" id="name" placeholder="اسم العميل">
    
    <input type="text" id="phone" placeholder="رقم التليفون" inputmode="numeric" pattern="[0-9]*">
    
    <input type="text" id="address" placeholder="العنوان">
    <input type="text" id="job" placeholder="الوظيفة">
    <input type="text" id="company" placeholder="اسم الشركة">
    <input type="date" id="date">
    <input type="text" id="app" placeholder="اسم الابلكيشن">
    <input type="number" id="amount" placeholder="مبلغ السحب">

    <button onclick="saveCustomer()">حفظ البيانات</button>

    <div class="msg" id="msg"></div>

    <a href="data.html">عرض البيانات ←</a>
</div>

<script>
function saveCustomer() {

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();
    let job = document.getElementById("job").value.trim();
    let company = document.getElementById("company").value.trim();
    let date = document.getElementById("date").value;
    let app = document.getElementById("app").value.trim();
    let amount = document.getElementById("amount").value;

    // تحقق إن كل الحقول متملية
    if (!name || !phone || !address || !job || !company || !date || !app || !amount) {
        alert("❌ لازم تملا كل البيانات");
        return;
    }

    // تحقق إن التليفون أرقام فقط
    if (!/^\d+$/.test(phone)) {
        alert("❌ رقم التليفون لازم يكون أرقام فقط");
        return;
    }

    // تحقق طول رقم التليفون (11 رقم)
    if (phone.length !== 11) {
        alert("❌ رقم التليفون لازم يكون 11 رقم");
        return;
    }

    let customer = {
        name,
        phone,
        address,
        job,
        company,
        date,
        app,
        amount
    };

    let customers = JSON.parse(localStorage.getItem("customers")) || [];

    customers.push(customer);

    localStorage.setItem("customers", JSON.stringify(customers));

    document.getElementById("msg").innerText = "تم الحفظ بنجاح ✅";

    // مسح البيانات
    document.querySelectorAll("input").forEach(input => input.value = "");
}
</script>

</body>
</html>
